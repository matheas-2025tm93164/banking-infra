apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: banking-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: "customer-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["customer-service:8001"]
      - job_name: "account-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["account-service:8002"]
      - job_name: "transaction-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["transaction-service:8003"]
      - job_name: "notification-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["notification-service:8004"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: banking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: banking-system
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: NodePort
